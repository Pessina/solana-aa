[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false
seeds = true

[programs.localnet]
solana_aa = "2PYNfKSoM7rFJeMuvEidASxgpdPAXYascVDmH6jpBa7o"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/**/*.spec.ts'"

[test.validator]
# Agave 3.1.x's gossip Node::new_with_external_ip panics on anchor's default
# --bind-address 0.0.0.0 (UnspecifiedIpAddr); pin it to localhost so the test
# validator starts.
bind_address = "127.0.0.1"
