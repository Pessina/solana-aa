[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false
seeds = true

[programs.localnet]
solana_aa = "2PYNfKSoM7rFJeMuvEidASxgpdPAXYascVDmH6jpBa7o"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 'tests/**/*.spec.ts'"

# Mainnet feature parity: the test validator enables every runtime feature by
# default, which masks mainnet incompatibilities (e.g. the removed RSA PoC's
# big_mod_exp syscall worked locally but made the program undeployable on
# mainnet). Deactivate everything inactive on mainnet so tests run under real
# conditions. Regenerate the list with:
#   solana feature status -um | grep inactive | awk '{print $1}'
[test.validator]
deactivate_feature = [
